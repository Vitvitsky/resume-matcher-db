[alembic]
# Путь к директории с миграциями
script_location = alembic

# Добавить текущий каталог в sys.path
prepend_sys_path = .

# Шаблон имён файлов миграций
file_template = %%(rev)s_%%(slug)s

# Часовой пояс в заголовках миграций
timezone = UTC

# DATABASE_URL читается из переменной окружения в env.py — здесь не задаём

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
