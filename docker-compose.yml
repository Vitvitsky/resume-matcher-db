services:
  postgres:
    image: postgres:16-alpine
    container_name: resume-matcher-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-resume_matcher}
      POSTGRES_USER: ${POSTGRES_USER:-resume_matcher}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-resume_matcher} -d ${POSTGRES_DB:-resume_matcher}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
    name: resume-matcher-postgres-data

networks:
  default:
    name: resume-matcher-db-network
